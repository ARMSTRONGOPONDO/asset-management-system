<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Asset Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background: #f4f4f7; display: flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.login-box { background:white; padding:40px; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1); text-align:center; width:320px; }
h2 { margin-bottom:25px; color:#0d6efd; font-size:24px; font-weight:bold; }
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc; font-size:16px; }
button { width:100%; padding:10px; margin:10px 0; border:none; border-radius:6px; background:#0d6efd; color:white; font-weight:bold; cursor:pointer; font-size:16px; }
button:hover { background:#094cba; }
.create-btn { background:#28a745; }
.create-btn:hover { background:#1e7e34; }
#error { color:red; margin-top:10px; font-size:14px; }
</style>
</head>
<body>

<div class="login-box">
<h2>LOGIN</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button class="create-btn" onclick="window.location.href='register.html'">Create Account</button>
<p id="error"></p>
</div>

<script>
async function login(){
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if(!username || !password){
        document.getElementById('error').innerText = "Please enter username and password";
        return;
    }
    try{
        const res = await fetch('http://localhost:3000/login',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username,password})
        });
        const data = await res.json();
        if(res.ok){
            sessionStorage.setItem('loggedInUser', username);
            window.location.href='home.html';
        } else {
            document.getElementById('error').innerText = data.msg;
        }
    }catch(err){
        document.getElementById('error').innerText = "Server error";
    }
}
</script>

</body>
</html>
