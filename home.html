<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Asset Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#f4f4f7; margin:0; }
header { background:#0d6efd; color:white; padding:20px; text-align:center; font-size:20px; font-weight:bold; }
button { padding:10px 20px; margin:10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
.dashboard { display:flex; justify-content:center; flex-wrap:wrap; margin-top:30px; }
.asset-btn { background:#28a745; color:white; }
.asset-btn:hover { background:#1e7e34; }
.report-btn { background:#ffc107; color:black; }
.report-btn:hover { background:#e0a800; }
.logout-btn { background:#dc3545; color:white; position:absolute; top:20px; right:20px; }
.logout-btn:hover { background:#a71d2a; }
form { display:none; flex-direction:column; max-width:400px; margin:20px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1); }
form input { margin:10px 0; padding:10px; border-radius:6px; border:1px solid #ccc; }
form button { margin:10px 0; }
</style>
</head>
<body>

<header>ASSET MANAGEMENT SYSTEM - <span id="user"></span></header>
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="dashboard">
<button class="asset-btn" onclick="showForm('assetForm')">Asset Management Form</button>
<button class="asset-btn" onclick="showForm('acquisitionForm')">Asset Acquisition Form</button>
<button class="asset-btn" onclick="showForm('disposalForm')">Asset Disposal Form</button>
<button class="report-btn" onclick="generateReports()">Reports</button>
</div>

<!-- Forms -->
<form id="assetForm">
<h3>Asset Management Form</h3>
<input type="text" id="assetName" placeholder="Asset Name">
<input type="number" id="assetQty" placeholder="Quantity">
<input type="text" id="assetReason" placeholder="Reason">
<button type="button" onclick="saveAsset()">Save</button>
<button type="button" onclick="printForm('assetForm')">Print</button>
</form>

<form id="acquisitionForm">
<h3>Asset Acquisition Form</h3>
<input type="text" id="acqName" placeholder="Asset Name">
<input type="number" id="acqQty" placeholder="Quantity">
<input type="text" id="acqReason" placeholder="Reason">
<button type="button" onclick="saveAcquisition()">Save</button>
<button type="button" onclick="printForm('acquisitionForm')">Print</button>
</form>

<form id="disposalForm">
<h3>Asset Disposal Form</h3>
<input type="text" id="dispName" placeholder="Asset Name">
<input type="number" id="dispQty" placeholder="Quantity">
<input type="text" id="dispReason" placeholder="Reason">
<button type="button" onclick="saveDisposal()">Save</button>
<button type="button" onclick="printForm('disposalForm')">Print</button>
</form>

<script>
const user = sessionStorage.getItem('loggedInUser');
if(!user) window.location.href='login.html';
document.getElementById('user').innerText = user;

function logout(){
    sessionStorage.removeItem('loggedInUser');
    window.location.href='login.html';
}

function showForm(formId){
    document.querySelectorAll('form').forEach(f=>f.style.display='none');
    document.getElementById(formId).style.display='flex';
}

function printForm(formId){
    const form = document.getElementById(formId);
    let content = form.innerHTML;
    let myWindow = window.open('', '', 'width=600,height=400');
    myWindow.document.write('<html><body>'+content+'</body></html>');
    myWindow.document.close();
    myWindow.print();
}

/* Save functions with backend API */
async function saveAsset(){
    const data = {
        name: document.getElementById('assetName').value,
        quantity: document.getElementById('assetQty').value,
        reason: document.getElementById('assetReason').value,
        user
    };
    await fetch('http://localhost:3000/assets',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
    alert('Asset saved!');
}

async function saveAcquisition(){
    const data = {
        name: document.getElementById('acqName').value,
        quantity: document.getElementById('acqQty').value,
        reason: document.getElementById('acqReason').value,
        user
    };
    await fetch('http://localhost:3000/acquisitions',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
    alert('Acquisition saved!');
}

async function saveDisposal(){
    const data = {
        name: document.getElementById('dispName').value,
        quantity: document.getElementById('dispQty').value,
        reason: document.getElementById('dispReason').value,
        user
    };
    await fetch('http://localhost:3000/disposals',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
    alert('Disposal saved!');
}

async function generateReports(){
    const assets = await fetch('http://localhost:3000/assets').then(r=>r.json());
    const acq = await fetch('http://localhost:3000/acquisitions').then(r=>r.json());
    const disp = await fetch('http://localhost:3000/disposals').then(r=>r.json());
    console.log("Assets:", assets);
    console.log("Acquisitions:", acq);
    console.log("Disposals:", disp);
    alert('Reports generated! Check console for details.');
}
</script>

</body>
</html>
